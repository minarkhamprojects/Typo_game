<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#12251b"/>
      <stop offset="58%" stop-color="#0a1710"/>
      <stop offset="100%" stop-color="#040a07"/>
    </radialGradient>
    <pattern id="matrix" width="13" height="13" patternUnits="userSpaceOnUse">
      <rect width="13" height="13" fill="#3cf07a"/>
      <circle cx="6.5" cy="6.5" r="4.3" fill="#0a1710"/>
    </pattern>
    <pattern id="scan" width="10" height="6" patternUnits="userSpaceOnUse">
      <rect width="10" height="6" fill="transparent"/>
      <rect width="10" height="2" y="4" fill="rgba(3,10,7,0.55)"/>
    </pattern>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round"><rect width="512" height="512" rx="114"/></clipPath>
    <clipPath id="tclip"><path d="M120 140 H392 V214 H300 V382 H212 V214 H120 Z"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <g stroke="#2fa857" stroke-width="2" opacity="0.14" fill="none" stroke-linecap="round">
      <path d="M40 96 H150 V150"/><path d="M472 130 H360 V70"/>
      <path d="M60 430 H200 V370"/><path d="M470 400 H330 V450"/>
      <circle cx="150" cy="150" r="5" fill="#2fa857" stroke="none"/>
      <circle cx="360" cy="70" r="5" fill="#2fa857" stroke="none"/>
      <circle cx="200" cy="370" r="5" fill="#2fa857" stroke="none"/>
    </g>
    <g filter="url(#glow)">
      <g clip-path="url(#tclip)">
        <rect width="512" height="512" fill="url(#matrix)"/>
        <rect width="512" height="512" fill="url(#scan)"/>
      </g>
    </g>
  </g>
</svg>
