<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Typo — Buscapalabras</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Typo</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Tiempo</span>
          <span class="stat-value" id="timer">1:30</span>
        </div>
        <div class="stat">
          <span class="stat-label">Puntos</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Palabras</span>
          <span class="stat-value" id="word-count">0</span>
        </div>
      </div>
    </header>

    <main class="board-area">
      <div class="current-word" id="current-word">&nbsp;</div>
      <div class="grid-wrap" id="grid-wrap">
        <div class="grid" id="grid" aria-label="Tablero de letras"></div>
        <svg id="path-overlay" aria-hidden="true"><polyline id="path-line" points="" /></svg>
        <div class="blur-hint"><span>Pulsa <strong>Comenzar</strong></span></div>
        <button id="rotate-left" class="rotate-side rotate-side-left" aria-label="Girar el tablero a la izquierda">⟲</button>
        <button id="rotate-right" class="rotate-side rotate-side-right" aria-label="Girar el tablero a la derecha">⟳</button>
      </div>
      <div class="controls">
        <button id="start-btn" class="btn btn-primary">Comenzar</button>
        <button id="new-board-btn" class="btn">Nuevo tablero</button>
        <button id="mute-btn" class="btn btn-icon" aria-label="Activar o silenciar sonido">🔊</button>
      </div>
      <!-- Switch nativo oculto: en iOS 17.4+ togglearlo produce un tick háptico
           (best-effort; navigator.vibrate no existe en iOS Safari) -->
      <input type="checkbox" switch id="haptic-switch" class="haptic-switch" aria-hidden="true" tabindex="-1" />
      <p class="hint" id="hint">Arrastra sobre letras adyacentes para formar palabras de al menos 3 letras.</p>
    </main>

    <aside class="found-panel">
      <h2>Palabras encontradas</h2>
      <ul class="found-list" id="found-list"></ul>
    </aside>
  </div>

  <div class="modal-overlay" id="summary-overlay" hidden>
    <div class="modal">
      <h2>¡Tiempo!</h2>
      <p class="modal-score">Puntaje final: <strong id="final-score">0</strong></p>
      <p id="final-details"></p>
      <div class="missed-section">
        <h3>Palabras que te perdiste</h3>
        <ul class="missed-list" id="missed-list"></ul>
      </div>
      <button id="play-again-btn" class="btn btn-primary">Jugar de nuevo</button>
    </div>
  </div>

  <script src="words_es.js"></script>
  <script src="engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
